<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" width="260" height="480">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde8d8"/>
      <stop offset="1" stop-color="#f0c0a0"/>
    </linearGradient>
    <linearGradient id="outfit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="130" cy="200" rx="120" ry="200" fill="url(#glow)"/>
  <ellipse cx="130" cy="370" rx="72" ry="104" fill="url(#outfit)"/>
  <ellipse cx="66" cy="315" rx="22" ry="72" fill="url(#outfit)" transform="rotate(-12 66 315)"/>
  <ellipse cx="194" cy="315" rx="22" ry="72" fill="url(#outfit)" transform="rotate(12 194 315)"/>
  <ellipse cx="50" cy="375" rx="15" ry="17" fill="url(#skin)"/>
