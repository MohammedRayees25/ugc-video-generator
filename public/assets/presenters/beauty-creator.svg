  <!-- Eyes -->
  <ellipse cx="108" cy="150" rx="10" ry="9" fill="white"/>
  <ellipse cx="152" cy="150" rx="10" ry="9" fill="white"/>
  <ellipse cx="109" cy="151" rx="7" ry="7" fill="#1a0a2e"/>
  <ellipse cx="153" cy="151" rx="7" ry="7" fill="#1a0a2e"/>
