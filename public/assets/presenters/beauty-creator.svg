  <path d="M97,134 Q108,127 120,132" stroke="#6b0f3a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M140,132 Q152,127 163,134" stroke="#6b0f3a" stroke-width="3" fill="none" stroke-linecap="round"/>
