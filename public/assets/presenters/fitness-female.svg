<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" width="260" height="480">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4a261"/>
      <stop offset="1" stop-color="#e76f51"/>
    </linearGradient>
    <linearGradient id="outfit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e63946"/>
      <stop offset="1" stop-color="#c1121f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#e63946" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow aura -->
  <ellipse cx="130" cy="200" rx="120" ry="200" fill="url(#glow)"/>
  <!-- Body / outfit -->
  <ellipse cx="130" cy="360" rx="72" ry="110" fill="url(#outfit)"/>
  <!-- Arms -->
  <ellipse cx="68" cy="310" rx="22" ry="70" fill="url(#outfit)" transform="rotate(-18 68 310)"/>
  <ellipse cx="192" cy="310" rx="22" ry="70" fill="url(#outfit)" transform="rotate(18 192 310)"/>
  <!-- Hands -->
  <ellipse cx="52" cy="370" rx="16" ry="18" fill="url(#skin)"/>
  <ellipse cx="208" cy="370" rx="16" ry="18" fill="url(#skin)"/>
  <!-- Neck -->
  <rect x="112" y="185" width="36" height="44" rx="16" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="130" cy="155" rx="58" ry="68" fill="url(#skin)"/>
  <!-- Hair -->
  <ellipse cx="130" cy="108" rx="60" ry="36" fill="#3d1a0a"/>
  <ellipse cx="72" cy="148" rx="18" ry="44" fill="#3d1a0a"/>
  <ellipse cx="188" cy="148" rx="18" ry="44" fill="#3d1a0a"/>
  <!-- Eyes -->
  <ellipse cx="110" cy="148" rx="9" ry="10" fill="white"/>
  <ellipse cx="150" cy="148" rx="9" ry="10" fill="white"/>
  <circle cx="112" cy="149" r="6" fill="#2d1b0a"/>
  <circle cx="152" cy="149" r="6" fill="#2d1b0a"/>
  <circle cx="114" cy="147" r="2" fill="white"/>
  <circle cx="154" cy="147" r="2" fill="white"/>
  <!-- Eyebrows -->
  <path d="M100,136 Q110,130 121,134" stroke="#3d1a0a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M139,134 Q150,130 161,136" stroke="#3d1a0a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M128,158 Q124,172 130,176 Q136,172 132,158" fill="none" stroke="#d4845a" stroke-width="2" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M112,188 Q130,200 148,188" stroke="#c1440a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <path d="M115,190 Q130,200 145,190" fill="white"/>
  <!-- Earrings -->
  <circle cx="73" cy="170" r="5" fill="#ffd700"/>
  <circle cx="187" cy="170" r="5" fill="#ffd700"/>
</svg>
